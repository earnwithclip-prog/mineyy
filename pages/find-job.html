<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Jobs — LocalServe</title>
    <meta name="description" content="Browse monthly job listings near you. Apply, chat with employers, and get hired today." />
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237C3AED'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='bold'>L</text></svg>" />
    <link rel="stylesheet" href="/styles/variables.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/components.css" />
    <link rel="stylesheet" href="/styles/pages.css" />
    <link rel="stylesheet" href="/styles/auth.css" />
    <link rel="stylesheet" href="/styles/chat.css" />
    <!-- Leaflet for map modal -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="/js/main.js"></script>
    <style>
        /* Radius Filter */
        .radius-filter-bar { display:flex; align-items:center; flex-wrap:wrap; gap:10px; padding:14px 16px; background:rgba(124,58,237,0.08); border:1px solid rgba(124,58,237,0.2); border-radius:12px; margin-bottom:16px; }
        .radius-filter-label { font-weight:600; color:#a78bfa; font-size:0.9rem; white-space:nowrap; }
        .radius-btns { display:flex; gap:6px; flex-wrap:wrap; }
        .radius-btn { padding:6px 14px; border:1.5px solid rgba(124,58,237,0.4); background:transparent; color:#9ca3af; border-radius:20px; cursor:pointer; font-size:0.85rem; font-weight:600; transition:all 0.2s; touch-action:manipulation; }
        .radius-btn.active { background:linear-gradient(135deg,#7c3aed,#4f46e5); color:#fff; border-color:transparent; }
        .geo-status { font-size:0.8rem; color:#6b7280; margin-left:auto; }

        /* Job card enhancements */
        .jcf-top { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:8px; min-height:24px; }
        .distance-badge { background:rgba(16,185,129,0.15); color:#10b981; font-size:0.75rem; font-weight:700; padding:3px 10px; border-radius:20px; }
        .worktype-badge { background:rgba(124,58,237,0.15); color:#a78bfa; font-size:0.75rem; font-weight:700; padding:3px 10px; border-radius:20px; }
        .job-desc-preview { font-size:0.82rem; color:#9ca3af; margin:6px 0; font-style:italic; }

        /* Map thumbnail */
        .job-map-thumb { position:relative; width:120px; height:70px; border-radius:8px; overflow:hidden; cursor:pointer; border:1.5px solid rgba(124,58,237,0.3); margin-top:10px; flex-shrink:0; }
        .job-map-thumb img { width:100%; height:100%; object-fit:cover; }
        .map-thumb-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.35); display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.8rem; font-weight:700; opacity:0; transition:opacity 0.2s; }
        .job-map-thumb:hover .map-thumb-overlay { opacity:1; }

        /* Applied jobs section */
        .section-heading { border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:12px; margin-bottom:20px; }
        .applied-job-card { padding:16px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); margin-bottom:12px; }
        .applied-job-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
        .status-badge { padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:700; white-space:nowrap; }
        .status-pending { background:rgba(245,158,11,0.15); color:#f59e0b; }
        .status-accepted { background:rgba(16,185,129,0.15); color:#10b981; }
        .status-rejected { background:rgba(239,68,68,0.15); color:#ef4444; }
        .contact-reveal-card { background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.25); border-radius:10px; padding:12px; margin-top:10px; }
        .contact-reveal-title { font-weight:700; color:#10b981; font-size:0.88rem; margin-bottom:6px; }
        .contact-reveal-item { font-size:0.88rem; color:#d1fae5; }
    </style>
</head>

<body>

    <nav class="navbar scrolled">
        <div class="container">
            <a href="/" class="nav-logo">
                <div class="nav-logo-icon">L</div>LocalServe
            </a>
            <div class="nav-links">
                <a href="/" data-i18n="nav_home">Home</a>
                <a href="/pages/need-worker.html" data-i18n="srv1_title">Need a Worker</a>
                <a href="/pages/need-work.html" data-i18n="srv2_title">Need Work</a>
                <a href="/pages/hire-monthly.html" data-i18n="srv3_title">Hire Employee</a>
                <a href="/pages/find-job.html" class="active-link" data-i18n="srv4_title">Find a Job</a>
            </div>
            <div class="nav-right">
                <div class="lang-switcher">
                    <button class="lang-btn">🌐 English ▾</button>
                    <div class="lang-dropdown">
                        <div class="lang-option active" data-lang="en">🇺🇸 English</div>
                        <div class="lang-option" data-lang="hi">🇮🇳 हिन्दी</div>
                        <div class="lang-option" data-lang="te">🇮🇳 తెలుగు</div>
                    </div>
                </div>
            </div>
            <div class="mobile-toggle"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <div class="breadcrumb"><a href="/">Home</a> <span>/</span> <span data-i18n="srv4_title">Find a Job</span></div>
            <h1 data-i18n="find_heading">Find Your Dream Job</h1>
            <p data-i18n="find_sub">Browse monthly job listings near you. Apply and get hired today.</p>
        </div>
    </div>

    <section class="jobs-section">
        <div class="container">

            <!-- Search Bar -->
            <div class="search-bar reveal">
                <div class="search-icon">🔍</div>
                <input type="text" class="search-input" data-i18n="find_search"
                    placeholder="Search jobs, roles, or companies..." />
                <button class="btn btn-primary">Search</button>
            </div>

            <!-- Radius Filter (injected by JS above the filters) -->

            <!-- Job Type Filters -->
            <div class="filters reveal reveal-delay-1">
                <div class="filter-pills">
                    <span class="pill pill-primary active" id="filterAll">All Jobs</span>
                    <span class="pill pill-primary" id="filterLatest">Latest</span>
                    <span class="pill pill-primary" id="filterSalary">Top Salary</span>
                </div>
            </div>

            <!-- Job Listings (dynamically populated) -->
            <div class="jobs-grid">
                <div style="text-align:center;padding:64px;color:#6b7280;grid-column:1/-1">
                    <div style="font-size:48px;margin-bottom:12px;">⏳</div>
                    <p>Loading jobs...</p>
                </div>
            </div>

        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <span data-i18n="footer_copyright">© 2026 LocalServe. All rights reserved.</span>
                <div class="footer-socials"><a href="#">𝕏</a><a href="#">in</a><a href="#">📸</a><a href="#">▶</a></div>
            </div>
        </div>
    </footer>

</body>

</html>
